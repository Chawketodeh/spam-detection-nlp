<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spam Detector</title>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #eef2f7, #f9fafb);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background-color: white;
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        text-align: center;
      }

      h1 {
        color: #1f2937;
        margin-bottom: 1.8rem;
      }

      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        margin-bottom: 1.2rem;
        resize: vertical;
        min-height: 110px;
        font-family: inherit;
        font-size: 1rem;
      }

      textarea:focus {
        outline: none;
        border-color: #2563eb;
      }

      button {
        background-color: #2563eb;
        color: white;
        border: none;
        padding: 12px 26px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #1e40af;
      }

      .result {
        margin-top: 1.6rem;
        padding: 1.1rem;
        border-radius: 8px;
        font-weight: bold;
        color: white;
        font-size: 1.05rem;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Spam Detector</h1>

      <form action="/predict" method="POST">
        <textarea
          name="message"
          placeholder="Enter your message here..."
          required
        >
{{ message|default('') }}</textarea
        >
        <button type="submit">Check Message</button>
      </form>

      {% if prediction %}
      <div class="result" style="background-color: {{ color }};">
        Prediction: {{ prediction }}
      </div>
      {% endif %}
    </div>
  </body>
</html>
